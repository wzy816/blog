<main>
  {{ $pages := where .Site.RegularPages "Type" "in" .Site.Params.mainSections }}
  {{ range $pages.GroupByParam "category" "desc" }}
  <div class="category">{{.Key}}</div>
  <ul>
    {{ range .Pages }}
    <li>
      <a href="{{ .RelPermalink }}">{{.Title}}</a>
      <time>{{ dateFormat "2006-01-02" .Date }}</time>
    </li>
    {{ end }}
  </ul>
  {{ end}}
  <script>
    feather.replace();
  </script>
</main>
