<main>
  <!-- <h1>all articles</h1> -->
  {{ .Site.Sections }}
  {{ $pages := where .Site.RegularPages "Type" "in" .Site.Params.mainSections }}
  {{ $pages = where $pages "Params.category" "eq" "writing" }}
  <ul>
    {{ range $pages }}
    <li>
      <a href="{{ .RelPermalink }}">{{.Title}}</a>
      <span class="time">{{ dateFormat "2006-01-02" .Date }}</span>
    </li>
    {{ end }}
  </ul>
  <script>
    feather.replace();
  </script>
</main>
