{{ define "main" }}
<h1 class="page-title">All Tags</h1>

<div class="tag-cloud">
  <ul class="tags">
    {{ $data := .Data }} {{ range $key, $value := .Data.Terms.ByCount }}
    <li>
      <a
        style="font-size: 1rem"
        href="{{ $.Site.LanguagePrefix | absURL }}{{ $data.Plural }}/{{ $value.Name | urlize }}/"
        >{{ $value.Name }}</a
      ><sup>{{$value.Count}}</sup>
    </li>
    {{ end }}
  </ul>
</div>
{{ end }}
