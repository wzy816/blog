{{ define "main" }}
<main>
  {{ range .Site.Taxonomies.series.Alphabetical }}
  <div class="series">{{ .Name }}</div>
  <ul>
    {{ range .Pages.ByDate.Reverse }}
    <li>
      <a href="{{ .RelPermalink }}">{{.Title}}</a>
      <span class="time">{{ dateFormat "Jan 2, 2006" .Date }}</span>
    </li>
    {{ end }}
  </ul>
  {{ end }}
</main>
<script>
  feather.replace();
</script>
{{ end }}
