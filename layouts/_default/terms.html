{{ define "main" }}
<main>
  {{ range .Site.Taxonomies.series.Alphabetical.Reverse }}
  <div class="series">
    {{ .Name }}
    <i data-feather="film"></i>
  </div>
  <ul>
    {{ range .Pages.ByDate.Reverse }}
    <li>
      <a href="{{ .RelPermalink }}">{{.Title}}</a>
    </li>
    {{ end }}
  </ul>
  {{ end }}
</main>
<script>
  feather.replace();
</script>
{{ end }}
